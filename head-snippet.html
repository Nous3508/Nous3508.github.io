<!-- Performance: preconnect to external origins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://img.shields.io">
<link rel="preconnect" href="https://github-readme-stats.vercel.app">
<!-- Google Fonts: Nunito Sans for friendly rounded typography -->
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- Favicon / PWA head snippet (recommended) -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="shortcut icon" href="/favicon.ico">

<!-- Android/Chrome -->
<link rel="manifest" href="/site.webmanifest">

<!-- Safari pinned tab (use a monochrome SVG mask) -->
<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">

<!-- Windows tile -->
<meta name="msapplication-TileColor" content="#2b5797">
<meta name="msapplication-TileImage" content="/mstile-150x150.png">

<!-- Theme color for mobile browsers -->
<meta name="theme-color" content="#0b1220">

<!-- Optional: mobile web app meta -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
