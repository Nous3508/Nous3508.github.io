<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  {% include head.html %}
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">{{ site.title }}</a>
      <nav class="main-nav">
        <a href="/#projects" class="nav-link">{{ "Projects" }}</a>
        <a href="/#blog" class="nav-link">{{ "Blog" }}</a>
        <a href="/#about" class="nav-link">{{ "About" }}</a>
        <a href="/docs" class="nav-link">{{ "Docs" }}</a>
      </nav>
      <div class="actions">
        <button id="search-toggle" aria-label="Search">🔍</button>
        <button id="lang-toggle" aria-label="Toggle language">EN/中文</button>
      </div>
    </div>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div>
        <strong>{{ site.title }}</strong> · © {{ "now" | date: "%Y" }}
      </div>
      <div class="social-links">
        <a id="gh-link" href="#" target="_blank">GitHub</a>
        <a id="tw-link" href="#" target="_blank">Twitter</a>
        <a id="li-link" href="#" target="_blank">LinkedIn</a>
      </div>
    </div>
  </footer>

  <div id="search-modal" class="search-modal" aria-hidden="true" style="display:none"></div>

  <script src="/assets/js/search.js"></script>
  <script src="/assets/js/site.js"></script>
</body>
</html>
